{% extends 'base.html' %}

{% block content %}

<h2>

Delete Task

</h2>

<p>

Are you sure you want to delete

<strong>

{{ task.title }}

</strong> ?

</p>

<form method="POST">

{% csrf_token %}

<button class="btn delete">

Yes Delete

</button>

<a class="btn" href="{% url 'task_list' %}">

Cancel

</a>

</form>

{% endblock %}
<a class="delete-link" href="{% url 'delete_task' task.id %}">
    Delete
</a>
